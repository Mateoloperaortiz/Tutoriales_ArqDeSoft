<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Tienda EAFIT{% endblock %}</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Custom configuration -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            50: '#eef8ff',
                            100: '#d7efff',
                            300: '#67c3ff',
                            400: '#33a8ff',
                            500: '#1683e6',
                            600: '#0b66ba',
                            900: '#0a315a',
                        },
                        dark: {
                            bg: '#081120',
                            surface: '#14253d',
                            border: '#36506f'
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out',
                        'slide-up': 'slideUp 0.6s ease-out',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #081120;
            color: #f8fafc;
            background-image: 
                radial-gradient(circle at 12% 20%, rgba(34, 197, 255, 0.18), transparent 24%),
                radial-gradient(circle at 88% 15%, rgba(45, 212, 191, 0.12), transparent 22%),
                linear-gradient(180deg, rgba(8, 17, 32, 0.98), rgba(13, 23, 40, 0.98));
            background-attachment: fixed;
            min-height: 100vh;
        }
        .glass-panel {
            background: rgba(17, 29, 48, 0.88);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(125, 164, 211, 0.18);
        }
        .glass-card {
            background: linear-gradient(160deg, rgba(18, 32, 54, 0.96), rgba(10, 19, 35, 0.95));
            backdrop-filter: blur(10px);
            border: 1px solid rgba(133, 179, 232, 0.16);
            box-shadow: 0 20px 60px rgba(2, 8, 23, 0.45);
        }
        .text-high {
            color: #f8fbff;
        }
        .text-mid {
            color: #d8e7fb;
        }
        .text-soft {
            color: #a9c0db;
        }
        .badge-accent {
            background: rgba(18, 131, 230, 0.18);
            color: #cce8ff;
            border: 1px solid rgba(103, 195, 255, 0.24);
        }
        .table-surface {
            background: rgba(14, 25, 42, 0.82);
        }
        
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0b1528; 
        }
        ::-webkit-scrollbar-thumb {
            background: #436487; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #5d84ac; 
        }
    </style>
</head>
<body class="antialiased font-sans selection:bg-primary-500 selection:text-white flex flex-col min-h-screen">
    
    <!-- Navigation / Header -->
    <nav class="sticky top-0 z-50 glass-panel border-b border-white/10 shadow-2xl shadow-black/40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <div class="flex-shrink-0">
                    <a href="{% url 'home' %}" class="flex items-center gap-3 group">
                        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary-300 to-primary-600 flex items-center justify-center text-white font-bold text-xl shadow-lg shadow-primary-500/30 group-hover:shadow-primary-400/40 group-hover:scale-105 transition-all duration-300">
                            TE
                        </div>
                        <div class="flex flex-col leading-tight">
                            <span class="text-xl font-bold text-high tracking-tight">Tienda <span class="text-primary-300">EAFIT</span></span>
                            <span class="text-[11px] font-medium uppercase tracking-[0.28em] text-soft">Arquitectura de Software 2026-1</span>
                        </div>
                    </a>
                </div>
                <div class="hidden md:block">
                    <div class="ml-10 flex items-baseline space-x-2">
                        <a href="{% url 'home' %}" class="text-mid hover:text-white hover:bg-white/10 px-4 py-2.5 rounded-lg text-sm font-semibold transition-all duration-300">
                            Catálogo
                        </a>
                        <a href="{% url 'inventario' %}" class="text-mid hover:text-white hover:bg-white/10 px-4 py-2.5 rounded-lg text-sm font-semibold transition-all duration-300">
                            Inventario
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-10 sm:py-16 animate-fade-in relative z-10">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Footer -->
    <footer class="mt-auto border-t border-white/10 bg-slate-950/60 backdrop-blur-sm relative z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-2 group cursor-pointer">
                <div class="w-6 h-6 rounded-md bg-gradient-to-br from-slate-700 to-slate-800 flex items-center justify-center border border-white/10">
                    <span class="text-xs font-bold text-slate-200 group-hover:text-white transition-colors">TE</span>
                </div>
                <span class="text-soft text-sm group-hover:text-slate-200 transition-colors">
                    &copy; 2026 Tienda EAFIT
                </span>
            </div>
            <div class="text-soft text-xs uppercase tracking-[0.24em]">
                Arquitectura de Software 2026-1
            </div>
        </div>
    </footer>

</body>
</html>
